<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Game</title>
    <style>
       body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #1a1a1a;
    color: white;
    overflow-x: hidden;
}
.header {
    background: #2c3e50;
    height: 65px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 2px solid #f1c40f;
}
.player-zone {
    display: flex;
    align-items: center;
    gap: 15px;
}
.profile-container {
    position: relative;
}
.avatar {
    width: 45px;
    height: 45px;
    background: #f1c40f;
    border-radius: 50%;
    cursor: pointer;
    overflow: hidden;
    border: 2px solid white;
    display: flex;
    justify-content: center;
    align-items: center;
}
.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.dropdown {
    display: none;
    position: absolute;
    top: 55px;
    left: 0;
    background: #34495e;
    min-width: 180px;
    border-radius: 4px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    z-index: 1000;
}
.dropdown.active {
    display: block;
}
.dropdown a {
    display: block;
    color: white;
    padding: 12px 15px;
    text-decoration: none;
    border-bottom: 1px solid #2c3e50;
}
.dropdown a:hover {
    background: #f1c40f;
    color: #2c3e50;
}
.wallet {
    background: #111;
    padding: 6px 15px;
    border-radius: 20px;
    border: 1px solid #f1c40f;
    display: flex;
    align-items: center;
}
.currency-label {
    color: #888;
    font-size: 11px;
    margin-right: 5px;
}
#moneyAmount {
    color: #f1c40f;
    font-weight: bold;
    font-size: 16px;
}
.bike-showcase {
    position: relative;
    height: 500px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
}
.glow-bg {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(241, 196, 15, 0.2) 0%, transparent 70%);
    filter: blur(50px);
    z-index: 1;
}
.bike-main {
    position: relative;
    z-index: 5;
}
.bike-main img {
    max-width: 550px;
    height: auto;
    filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
    transition: transform 0.4s;
}
.bike-main:hover img {
    transform: scale(1.05);
}
.shadow-pedestal {
    width: 400px;
    height: 30px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.7) 0%, transparent 80%);
    margin: -30px auto 0;
    border-radius: 50%;
}
.spec-tag {
    position: absolute;
    background: rgba(44, 62, 80, 0.9);
    padding: 12px 20px;
    border-left: 4px solid #f1c40f;
    z-index: 10;
}
.spec-tag.left { left: 10%; top: 20%; }
.spec-tag.right { right: 10%; bottom: 20%; }
.spec-tag .label {
    font-size: 10px;
    color: #bdc3c7;
    display: block;
    margin-bottom: 5px;
}
.spec-tag .value {
    font-size: 22px;
    font-weight: bold;
}
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px 20px;
}
.stat-card {
    background: #2c3e50;
    width: 200px;
    padding: 20px;
    border-radius: 10px;
    border-left: 4px solid #f1c40f;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.stat-label {
    font-size: 10px;
    color: #bdc3c7;
    text-transform: uppercase;
    display: block;
    margin-bottom: 10px;
}
.stat-value {
    font-size: 24px;
    font-weight: bold;
} 
.stats-label {
    color:#000000;
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 5px;
    margin: 30px 0 15px 0;
    margin-bottom: 50px;
    display: block;
    text-align: center;
    width: 100%;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    background: linear-gradient(180deg, #fff 0%, #aaa 100%);
}
</style>
</head>
<body>
    <header class="header">
        <div class="player-zone">
            <div class="profile-container">
                <div class="avatar" id="profileBtn">
                    <img src="avatar.png.jpg"> 
                </div>
                <div class="dropdown" id="profileMenu">
                    <a href="game.html">🏠 Главная</a>
                    <a href="garage.html">🏗 Гараж</a>
                    <a href="invest.html">🎰 Мото-Минёр</a>
                    <a href="catalog.html">📖 Каталог</a>
                    <a href="auction.html">🔨 Аукцион</a>
                    <a href="#">⚙️ Настройки</a>
                    <a href="index.html" style="color: #ff4d4d;">🚪 Выход</a>
                </div>
            </div>
            <div class="wallet">
                <span class="currency-label">OCTANES:</span>
                <span id="moneyAmount">15,000</span>
                <span style="margin-left: 5px;">🔥</span>
            </div>
        </div>
    </header>
    <section class="bike-showcase">
        <div class="glow-bg"></div>
        <div class="spec-tag left">
            <span class="label">МОЩНОСТЬ</span>
            <span class="value">214 HP</span>
        </div>
        <div class="bike-main">
            <img scr="moto.png.jpg">
            <div class="shadow-pedestal"></div>
        </div>
        <div class="spec-tag right">
            <span class="label">СТОИМОСТЬ</span>
            <span class="value">4.2M 🔥</span>
        </div>
    </section>
<div class="stats-label">Твоя статистика</div>
<div class="player-stats-conteiner">
  <div class="player-stats-container">
    <div class="stat-card">Байков: <span id="stat-bikes">12</span></div>
    <div class="stat-card">Прибыль: <span id="stat-profit">+45k</span></div>
    <div class="stat-card">LVL: <span id="user-level">1</span></div>
    <div class="stat-card">Статус: <span id="user-status" style="color:#f39c12">Новичок</span></div>
    <div class="xp-wrapper" style="grid-column: 1 / -1; margin-top: 10px;">
        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
            <span>Прогресс уровня</span>
            <span id="xp-text">0 / 2500 XP</span>
        </div>
        <div style="width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #333;">
            <div id="xp-bar-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #f39c12, #e67e22); transition: 0.5s;"></div>
        </div>
    </div>
</div>
    <script>
function refreshPlayerData() {
    const bal = localStorage.getItem('octanes') || "5000000";
    const balEl = document.getElementById('moneyAmount'); // Тот самый ID
    if (balEl) balEl.innerText = Number(bal).toLocaleString();

    const xp = parseInt(localStorage.getItem('userXP')) || 0;
    const lvl = parseInt(localStorage.getItem('userLevel')) || 1;
    const nextLevelXP = lvl * 2500;

    if (document.getElementById('user-level')) document.getElementById('user-level').innerText = lvl;
    if (document.getElementById('xp-text')) document.getElementById('xp-text').innerText = xp + " / " + nextLevelXP;
    if (document.getElementById('xp-bar-fill')) document.getElementById('xp-bar-fill').style.width = (xp / nextLevelXP * 100) + "%";

    const st = document.getElementById('user-status');
    if (st) {
        st.innerText = lvl >= 16 ? "ЛЕГЕНДА" : lvl >= 6 ? "PRO" : "Новичок";
        st.style.color = lvl >= 16 ? "#f1c40f" : lvl >= 6 ? "#9b59b6" : "#f39c12";
    }
}

function setupMenu() {
    const btn = document.getElementById('profileBtn');
    const menu = document.getElementById('profileMenu');
    if (btn && menu) {
        btn.onclick = (e) => { e.stopPropagation(); menu.classList.toggle('active'); };
    }
    window.onclick = () => { if (menu) menu.classList.remove('active'); };
}

window.onload = function() {
    refreshPlayerData();
    setupMenu();
};
    </script>
</body>
</html>
