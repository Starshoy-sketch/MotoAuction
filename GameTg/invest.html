<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мото-Минёр</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #0f0f0f;
            color: white;
            overflow-x: hidden;
        }
        .header {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #f39c12;
            background: #111;
            position: relative;
            z-index: 100;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            position: relative;
        }
        .avatar-circle {
            width: 45px;
            height: 45px;
            background: #f1c40f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 20px;
        }
        .balance-box {
            background: #1a1a1a;
            border: 1px solid #f39c12;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .balance-box span { color: #f1c40f; }
        .dropdown-menu {
            position: absolute;
            top: 60px;
            left: 0;
            width: 220px;
            background: #1c252d;
            border-left: 3px solid #f39c12;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown-menu.active { display: flex; }
        .menu-item {
            padding: 12px 20px;
            color: #bdc3c7;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .menu-item.active { color: #fff; background: rgba(243, 156, 18, 0.1); }
        .menu-item.exit { color: #e74c3c; }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 65px);
            gap: 10px;
            margin: 30px 0;
        }
        .cell {
            width: 65px; height: 65px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .cell.safe { background: #27ae60; border-color: #2ecc71; }
        .cell.bomb { background: #c0392b; border-color: #e74c3c; }
        .btn {
            background: #f39c12;
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="user-profile" id="profileToggle">
            <div class="avatar-circle">P</div>
            <div class="balance-box">OCTANES: <span id="balanceDisplay">0</span> 🔥</div>
            <div class="dropdown-menu" id="sideMenu">
                <a href="game.html">🏠 Главная</a>
                    <a href="garage.html">🏗 Гараж</a>
                    <a href="invest.html">🎰 Мото-Минёр</a>
                    <a href="catalog.html">📖 Каталог</a>
                    <a href="auction.html">🔨 Аукцион</a>
                    <a href="#">⚙️ Настройки</a>
                    <a href="index.html" style="color: #ff4d4d;">🚪 Выход</a>
            </div>
        </div>
    </header>
    <div class="game-container">
        <h1>МОТО-МИНЁР</h1>
        <h2 id="mult">1.00x</h2>
        <div class="grid" id="grid"></div>
        <div class="controls">
            <input type="number" id="bet" value="5000" style="padding: 10px; border-radius: 5px; margin-right: 10px;">
            <button class="btn" id="actionBtn" onclick="toggleGame()">ИГРАТЬ</button>
        </div>
    </div>
    <script src="js/core.js"></script>
    <script>
        const profileToggle = document.getElementById('profileToggle');
        const sideMenu = document.getElementById('sideMenu');
        profileToggle.onclick = (e) => {
            e.stopPropagation();
            sideMenu.classList.toggle('active');
        };
        window.onclick = () => sideMenu.classList.remove('active')
        let balance = parseInt(localStorage.getItem('octanes')) || 5000000;
        let isPlaying = false;
        let mines = [];
        let currentMult = 1.0;
        function updateUI() {
            document.getElementById('balanceDisplay').textContent = balance.toLocaleString();
            localStorage.setItem('octanes', balance);
        }
        function toggleGame() {
            const btn = document.getElementById('actionBtn');
            const betInput = document.getElementById('bet');
            if (!isPlaying) {
                let betValue = parseInt(betInput.value);
                if (betValue > balance || betValue <= 0) return alert("Мало денег!");
                
                balance -= betValue;
                isPlaying = true;
                currentMult = 1.0;
                mines = Array.from({length: 3}, () => Math.floor(Math.random() * 25));
                
                btn.textContent = "ЗАБРАТЬ";
                btn.style.background = "#27ae60";
                render();
            } else {
    let betValue = parseInt(document.getElementById('bet').value);
    let winAmount = Math.floor(betValue * currentMult);
    let profit = winAmount - betValue;
    let earnedXP = Math.min(Math.floor(profit / 200), 50);
    if (typeof addXP === 'function' && earnedXP > 0) {
        addXP(earnedXP);
    }
    balance += winAmount;
    stop();
}
            updateUI();
        }
        function render() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for(let i=0; i<25; i++) {
                const c = document.createElement('div');
                c.className = 'cell';
                c.onclick = () => {
                    if(!isPlaying) return;
                    if(mines.includes(i)) {
                        c.classList.add('bomb'); c.innerText = '💥';
                        stop();
                    } else {
                        c.classList.add('safe'); c.innerText = '🏍️';
                        currentMult += 0.2;
                        document.getElementById('mult').innerText = currentMult.toFixed(2) + 'x';
                    }
                };
                g.appendChild(c);
            }
        }
        function stop() {
            isPlaying = false;
            const btn = document.getElementById('actionBtn');
            btn.textContent = "ИГРАТЬ";
            btn.style.background = "#f39c12";
            updateUI();
        }
        updateUI();
        render();
    </script>
</body>
</html>
